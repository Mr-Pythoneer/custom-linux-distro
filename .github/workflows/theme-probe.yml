name: theme-probe
# Throwaway diagnostic (v3): the pinned-old WhiteSur commit's install.sh exits 1
# right after its banner. Try LATEST WhiteSur with a bash -x trace to find the
# failing command, and build blur-my-shell from source (it is NOT in apt).
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y sassc libglib2.0-dev-bin libxml2-utils git \
            gnome-themes-extra make gettext

      - name: WhiteSur GTK latest — trace the failing command
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/vinceliuice/WhiteSur-gtk-theme.git ws
          echo "WS_HEAD=$(git -C ws rev-parse HEAD)"
          mkdir -p /tmp/ws-out
          echo "=== bash -x trace (last 40 lines before it stops) ==="
          bash -x ws/install.sh -d /tmp/ws-out 2>&1 | tail -40 || true
          echo "=== result ==="
          ls -d /tmp/ws-out/WhiteSur-Dark 2>/dev/null && echo "WHITESUR_OK" || echo "WHITESUR_MISSING"

      - name: blur-my-shell — build from source + locate extension
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/aunetx/blur-my-shell.git bms
          echo "BMS_HEAD=$(git -C bms rev-parse HEAD)"
          make -C bms build 2>&1 | tail -15 || make -C bms 2>&1 | tail -15 || true
          echo "=== metadata.json locations ==="
          find bms -name metadata.json -not -path '*/node_modules/*'
          echo "=== does _build exist? ==="
          ls -la bms/_build 2>/dev/null | head || echo "no _build dir"
