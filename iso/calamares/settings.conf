# Calamares top-level settings. Format/keys per Calamares' documented
# schema (calamares.io/docs) — NOT verified against a running Calamares
# instance, see iso/calamares/README.md.

modules-search: [ local ]

instances:
- id: rootfs
  module: unpackfs
  config: unpackfs.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: crucibleos

prompt-install: true
dont-chroot: false
