# Calamares top-level settings. Format/keys per Calamares' documented
# schema (calamares.io/docs) — NOT verified against a running Calamares
# instance, see iso/calamares/README.md.

modules-search: [ local ]

# No custom instances: the exec sequence references bare `unpackfs`, which uses
# the default instance and loads modules/unpackfs.conf directly. (A named
# `instances:` entry only applies to an `unpackfs@<id>` sequence entry, so the
# previous rootfs instance here was dead config — its unpackfs.conf override
# never took effect and, worse, no modules/unpackfs.conf existed at all, which
# aborted the install.)

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: crucibleos

prompt-install: true
dont-chroot: false
