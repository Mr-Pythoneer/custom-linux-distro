# Calamares unpackfs — copies the live squashfs onto the freshly-partitioned
# target root. WITHOUT this file the unpackfs job has no configuration and the
# install aborts partway through ("Bad unpackfs configuration"), so an install
# is impossible. Format per calamares/src/modules/unpackfs/unpackfs.conf.
#
# PATH CAVEAT (must be confirmed on the first real build — see
# iso/calamares/README.md; nothing here has run against a live Calamares yet):
# this repo builds with Debian live-build (`lb`), whose default initramfs is
# live-boot, which names the image live/filesystem.squashfs and mounts the
# medium at /run/live/medium — hence the source below. If the image is instead
# built with casper (Ubuntu-style, `lb config --initramfs casper`), the path is
# /cdrom/casper/filesystem.squashfs. Set whichever matches the actual boot.
unpack:
    - source: "/run/live/medium/live/filesystem.squashfs"
      sourcefs: "squashfs"
      destination: ""
