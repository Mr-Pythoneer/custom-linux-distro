# Calamares partition module config.
#
# This is the module I'm LEAST confident about reproducing correctly from
# memory — its schema has more moving parts (EFI/BIOS handling, encryption,
# swap strategy) than welcome/users, and gets the most version-to-version
# changes. Treat this file as a starting point to check against Calamares'
# own example configs (in its source tree, partition/examples/) on a real
# build host, not something to trust as-is.

efi:
  systemPartition: /boot/efi
  userSwapChoices:
    - none
    - small
    - suspend
    - file

defaultFileSystemType: ext4

availableFileSystemTypes:
  - ext4
  - btrfs

initialPartitioningChoice: erase
initialSwapChoice: file

drawNestedPartitions: false
alwaysShowPartitionLabels: true
